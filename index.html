<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>TikTok OAuth Callback</title>
</head>
<body style="font-family: sans-serif; max-width: 600px; margin: 40px auto;">
  <h1>Autorização TikTok</h1>
  <p>Copie o código abaixo e cole no terminal do ClipForge:</p>

    document.getElementById('code').textContent = params.get('code') || '(nenhum codigo encontrado na URL)';
  </script>
</body>
</html>
